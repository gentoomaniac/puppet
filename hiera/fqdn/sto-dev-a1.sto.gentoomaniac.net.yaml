---
classes:
  - docker
  - docker::networks
  - docker::run_instance

ressources:
  zfs:
    "datapool/traefik":
      ensure: present
    "datapool/gitea":
      ensure: present
  file:
    "/srv/traefik/conf":
      ensure: directory
      require: Zfs[datapool/traefik]
    "/srv/traefik/ssl":
      ensure: directory
      require: Zfs[datapool/traefik]
    "/srv/traefik/ssl/key.pem":
      ensure: present
      content: "%{lookup('secret_srv_gentoomaniac_net_key')}"
      require: File[/srv/traefik/ssl]
      notify: Docker::Run[traefik]
    "/srv/traefik/ssl/cert.pem":
      ensure: present
      content: "%{lookup('secret_srv_gentoomaniac_net_cert')}"
      require: File[/srv/traefik/ssl]
      notify: Docker::Run[traefik]
    "/srv/traefik/conf/certs.toml":
      ensure: present
      content: |
        [tls.stores]
          [tls.stores.default]
          [tls.stores.default.defaultCertificate]
            certFile = "/ssl/cert.pem"
            keyFile = "/ssl/key.pem"
      require:
        - File[/srv/traefik/ssl/cert.pem]
        - File[/srv/traefik/ssl/key.pem]
    /srv/gitea/data:
      ensure: directory
      owner: 1000
      group: 1000
      require: Zfs[datapool/gitea]

docker::docker_users:
  - marco

docker::networks::networks:
  web:
    ensure: "present"

docker::run_instance::instance:
  gitea:
    image: docker.gitea.com/gitea:1.25
    dns:
      - 10.1.1.52
      - 10.1.1.53
    env:
      - USER_UID=1000
      - USER_GID=1000
      - SSH_DOMAIN=git.srv.gentoomaniac.net
      - SSH_PORT=222
      - SSH_LISTEN_PORT=22
    expose:
      - "3000"
      - "22"
    extra_parameters:
      - --restart=unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.gitea.rule=Host(`git.srv.gentoomaniac.net`)
      - traefik.http.routers.gitea.entrypoints=websecure
      - traefik.http.routers.gitea.tls=true
      - traefik.http.middlewares.gitea-whitelist.ipallowlist.sourcerange=10.1.1.0/24,192.168.0.0/16
      - traefik.http.routers.gitea.middlewares=gitea-whitelist
      - traefik.http.services.gitea.loadbalancer.server.port=3000
      - traefik.tcp.routers.gitssh.entrypoints=ssh
      - traefik.tcp.routers.gitssh.rule=HostSNI(`*`)
      - traefik.tcp.services.gitssh.loadbalancer.server.port=22
      - traefik.tcp.middlewares.gitea-ssh-whitelist.ipallowlist.sourcerange=10.1.1.0/24,192.168.0.0/16
      - traefik.tcp.routers.gitssh.middlewares=gitea-ssh-whitelist
    net:
      - web
    pull_on_start: true
    volumes:
      - /srv/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    require:
      - Class[docker]
      - File[/srv/gitea/data]
  traefik:
    image: traefik:v3.1
    command: >
      --api.insecure=true
      --api.dashboard=true
      --entrypoints.websecure.address=:443
      --entrypoints.git.address=:222
      --serverstransport.insecureskipverify=true
      --providers.docker
      --providers.docker.exposedbydefault=false
      --providers.file.directory=/conf
      --providers.file.watch=true
      --metrics.prometheus=true
    dns:
      - 10.1.1.52
      - 10.1.1.53
    env:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    extra_parameters:
      - --restart=unless-stopped
    net:
      - web
    ports:
      - 443:443/tcp
      - 8080:8080/tcp
      - 222:222/tcp
    pull_on_start: true
    require:
      - Class[docker]
      - Docker_network[web]
      - File[/srv/traefik/conf/certs.toml]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/traefik/ssl:/ssl:ro
      - /srv/traefik/conf:/conf:ro
